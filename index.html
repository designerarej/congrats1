<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#fff;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px 16px}
.w{width:100%;max-width:460px;display:flex;flex-direction:column;gap:16px}
h2{font-size:15px;font-weight:700;color:#222;text-align:center}

/* صور الاختيار */
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.thumb{border-radius:10px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:border-color .2s}
.thumb.active{border-color:#6c3fc5}
.thumb img{width:100%;display:block;aspect-ratio:9/16;object-fit:cover}

/* معاينة */
.box{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.15)}
.box img{width:100%;display:block}
.ov{position:absolute;left:0;right:0;bottom:18%;text-align:center;pointer-events:none}
.ov span{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700;font-size:30px;color:#3b1a7a;text-shadow:0 1px 8px rgba(255,255,255,0.6)}

/* كونترولز */
.ctrl{background:#f7f5ff;border:1px solid #e0d8f5;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px}
label{color:#444;font-size:13px;font-weight:700;display:block;margin-bottom:4px}
input[type=text]{width:100%;padding:11px 14px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:16px;font-weight:700;border:1.5px solid #c9b8f0;border-radius:10px;background:#fff;color:#222;direction:rtl;outline:none}
input[type=text]:focus{border-color:#6c3fc5}
input[type=text]::placeholder{color:#bbb;font-weight:400}
.cr{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s}
.sw.on{border-color:#333;transform:scale(1.15)}
input[type=color]{width:28px;height:28px;border-radius:50%;border:2px solid #ccc;cursor:pointer;background:none;padding:0}
.sr{display:flex;align-items:center;gap:8px}
input[type=range]{flex:1;accent-color:#6c3fc5}
.sv{color:#6c3fc5;font-size:12px;font-weight:700;min-width:30px;text-align:center}
.h{color:#aaa;font-size:11px}
.btn{width:100%;padding:13px;background:#6c3fc5;color:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:11px;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
canvas{display:none}
</style>
</head>

let cur=0,col='#3b1a7a',fs=48,pos=18;

// set real thumb images
window.addEventListener('load',()=>{
  
  document.getElementById('nd').style.color=col;
  resize();
});

function selectImg(i,el){
  cur=i;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('bg').src=IMGS[i];
}
function upN(){document.getElementById('nd').textContent=document.getElementById('ni').value}
function setC(c,el){
  col=c;document.getElementById('nd').style.color=c;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  if(el)el.classList.add('on');
  document.getElementById('cp').value=c;
}
function upS(v){fs=+v;document.getElementById('sv').textContent=v;resize()}
function upP(v){pos=+v;document.getElementById('pv').textContent=v+'%';document.getElementById('ov').style.bottom=v+'%'}
function resize(){
  const bw=document.getElementById('box').offsetWidth;
  document.getElementById('nd').style.fontSize=Math.round(fs*bw/460)+'px';
}
function dl(){
  const name=document.getElementById('ni').value.trim();
  if(!name){alert('اكتب الاسم أولاً');return}
  const btn=document.getElementById('db');
  btn.textContent='⏳ جاري التحضير...';btn.disabled=true;
  const img=new Image();
  img.onload=function(){
    const W=img.naturalWidth,H=img.naturalHeight;
    const cv=document.getElementById('cv');
    cv.width=W;cv.height=H;
    const ctx=cv.getContext('2d');
    ctx.drawImage(img,0,0,W,H);
    const sf=Math.round(fs*W/460);
    ctx.font='700 '+sf+'px "IBM Plex Sans Arabic",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=sf*.12;ctx.shadowOffsetY=sf*.03;
    ctx.fillStyle=col;
    ctx.fillText(name,W/2,H-(H*pos/100));
    const a=document.createElement('a');
    a.href=cv.toDataURL('image/png');
    a.download='تهنئة-'+name+'.png';
    a.click();
    btn.textContent='⬇️ تحميل بجودة عالية PNG';btn.disabled=false;
  };
  img.src=IMGS[cur];
}
</script>
