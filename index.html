<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بطاقة تهنئة رمضان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', sans-serif;
    background: #0d1b2a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  .preview-box {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .preview-box img.bg { width: 100%; display: block; }
  .name-overlay {
    position: absolute;
    left: 0; right: 0;
    bottom: 18%;
    text-align: center;
    pointer-events: none;
  }
  .name-overlay span {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 34px;
    color: #c8a951;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  }
  .controls {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label { color: #c8d6e0; font-size: 13px; font-weight: 700; display: block; margin-bottom: 4px; }
  input[type=text] {
    width: 100%;
    padding: 12px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 17px;
    font-weight: 700;
    border: 1.5px solid rgba(200,169,81,0.4);
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    color: #fff;
    direction: rtl;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: #c8a951; }
  input[type=text]::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .swatch {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; }
  input[type=color] {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    background: none;
    padding: 0;
  }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  input[type=range] { flex: 1; accent-color: #c8a951; }
  .slider-val { color: #c8a951; font-size: 13px; font-weight: 700; min-width: 36px; text-align: center; }
  .hint { color: rgba(255,255,255,0.3); font-size: 12px; }
  .btn-download {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #c8a951, #a07c2e);
    color: #1a0f00;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 900;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-download:active { transform: translateY(0); }
  .btn-download:disabled { opacity: 0.6; cursor: not-allowed; }
  canvas { display: none; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="preview-box" id="previewBox">
    <img class="bg" id="bgImg" src="card-image.png" alt="بطاقة تهنئة رمضان" />
    <div class="name-overlay" id="nameOverlay">
      <span id="nameDisplay"></span>
    </div>
  </div>

  <div class="controls">

    <div>
      <label>✏️ اكتب الاسم</label>
      <input type="text" id="nameInput" placeholder="أدخل الاسم هنا..." oninput="updateName()" />
    </div>

    <div>
      <label>🎨 لون الاسم</label>
      <div class="color-row">
        <div class="swatch active" style="background:#c8a951" onclick="setColor('#c8a951',this)"></div>
        <div class="swatch" style="background:#ffffff" onclick="setColor('#ffffff',this)"></div>
        <div class="swatch" style="background:#a8e6cf" onclick="setColor('#a8e6cf',this)"></div>
        <div class="swatch" style="background:#ffd3b6" onclick="setColor('#ffd3b6',this)"></div>
        <div class="swatch" style="background:#b8c6db" onclick="setColor('#b8c6db',this)"></div>
        <input type="color" id="colorCustom" value="#c8a951" title="لون مخصص" oninput="setColor(this.value,null)" />
      </div>
    </div>

    <div>
      <label>🔡 حجم الخط</label>
      <div class="slider-row">
        <span class="hint">ص</span>
        <input type="range" id="sizeRange" min="16" max="80" value="52" step="1" oninput="updateSize(this.value)" />
        <span class="hint">ك</span>
        <span class="slider-val" id="sizeVal">52</span>
      </div>
    </div>

    <div>
      <label>📍 موضع الاسم</label>
      <div class="slider-row">
        <span class="hint">أعلى</span>
        <input type="range" id="posRange" min="5" max="90" value="18" step="1" oninput="updatePos(this.value)" />
        <span class="hint">أسفل</span>
        <span class="slider-val" id="posVal">18%</span>
      </div>
    </div>

    <button class="btn-download" id="dlBtn" onclick="downloadHQ()">⬇️ تحميل بجودة عالية PNG</button>

  </div>
</div>

<canvas id="canvas"></canvas>

<script>
let nameColor = '#c8a951';
let fontSize = 52;
let posFromBottom = 18;

function updateName() {
  document.getElementById('nameDisplay').textContent = document.getElementById('nameInput').value;
}

function setColor(c, el) {
  nameColor = c;
  document.getElementById('nameDisplay').style.color = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('colorCustom').value = c;
}

function updateSize(v) {
  fontSize = parseInt(v);
  document.getElementById('sizeVal').textContent = v;
  const boxW = document.getElementById('previewBox').offsetWidth;
  document.getElementById('nameDisplay').style.fontSize = Math.round(fontSize * boxW / 480) + 'px';
}

function updatePos(v) {
  posFromBottom = parseInt(v);
  document.getElementById('posVal').textContent = v + '%';
  document.getElementById('nameOverlay').style.bottom = v + '%';
}

function downloadHQ() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { alert('من فضلك اكتب الاسم أولاً'); return; }

  const btn = document.getElementById('dlBtn');
  btn.textContent = '⏳ جاري التحضير...';
  btn.disabled = true;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const W = img.naturalWidth;
    const H = img.naturalHeight;
    const canvas = document.getElementById('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, W, H);

    const scaledFont = Math.round(fontSize * W / 480);
    ctx.font = '900 ' + scaledFont + 'px Cairo, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const x = W / 2;
    const y = H - (H * posFromBottom / 100);

    ctx.shadowColor = 'rgba(0,0,0,0.65)';
    ctx.shadowBlur = scaledFont * 0.15;
    ctx.shadowOffsetY = scaledFont * 0.04;
    ctx.fillStyle = nameColor;
    ctx.fillText(name, x, y);

    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'تهنئة-رمضان-' + name + '.png';
    a.click();

    btn.textContent = '⬇️ تحميل بجودة عالية PNG';
    btn.disabled = false;
  };
  img.onerror = function() {
    alert('تعذّر تحميل الصورة.');
    btn.textContent = '⬇️ تحميل بجودة عالية PNG';
    btn.disabled = false;
  };
  img.src = 'card-image.png';
}

window.addEventListener('load', () => {
  document.getElementById('nameDisplay').style.color = nameColor;
  const boxW = document.getElementById('previewBox').offsetWidth;
  document.getElementById('nameDisplay').style.fontSize = Math.round(52 * boxW / 480) + 'px';
});
</script>
</body>
</html>
